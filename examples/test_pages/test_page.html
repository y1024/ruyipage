<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuyiPage 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .section h2 {
            margin-top: 0;
            color: #333;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: 1px solid #007bff;
            background: #007bff;
            color: white;
            border-radius: 3px;
        }
        button:hover {
            background: #0056b3;
        }
        input, textarea, select {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .hidden {
            display: none;
        }
        .box {
            width: 100px;
            height: 100px;
            background: #4CAF50;
            margin: 10px;
            display: inline-block;
            cursor: move;
        }
        #drop-zone {
            width: 300px;
            height: 200px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            background: #f0f0f0;
            border-radius: 3px;
            min-height: 20px;
        }
        #shadow-host {
            padding: 20px;
            background: #e0e0e0;
            margin: 10px 0;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 5px;
            width: 50%;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1 id="main-title">RuyiPage 功能测试页面</h1>

    <!-- 基础元素查找测试 -->
    <div class="section" id="element-section">
        <h2>元素查找测试</h2>
        <div id="test-div" class="test-class" data-test="value">测试文本内容</div>
        <p class="test-class">段落1</p>
        <p class="test-class">段落2</p>
        <p class="test-class">段落3</p>
        <a href="https://example.com" id="test-link">测试链接</a>
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="测试图片" id="test-img">
    </div>

    <!-- 表单交互测试 -->
    <div class="section" id="form-section">
        <h2>表单交互测试</h2>
        <input type="text" id="text-input" placeholder="输入文本">
        <input type="password" id="password-input" placeholder="输入密码">
        <input type="email" id="email-input" placeholder="输入邮箱">
        <input type="number" id="number-input" placeholder="输入数字">
        <textarea id="textarea" rows="3" placeholder="多行文本"></textarea>

        <div>
            <input type="checkbox" id="checkbox1" value="option1">
            <label for="checkbox1">选项1</label>
            <input type="checkbox" id="checkbox2" value="option2">
            <label for="checkbox2">选项2</label>
        </div>

        <div>
            <input type="radio" name="radio-group" id="radio1" value="r1">
            <label for="radio1">单选1</label>
            <input type="radio" name="radio-group" id="radio2" value="r2">
            <label for="radio2">单选2</label>
        </div>

        <select id="select-single">
            <option value="">请选择</option>
            <option value="opt1">选项1</option>
            <option value="opt2">选项2</option>
            <option value="opt3">选项3</option>
        </select>

        <select id="select-multiple" multiple>
            <option value="m1">多选1</option>
            <option value="m2">多选2</option>
            <option value="m3">多选3</option>
        </select>

        <input type="file" id="file-input">

        <button id="submit-btn" onclick="handleSubmit()">提交表单</button>
        <div id="form-result" class="result"></div>
    </div>

    <!-- 按钮点击测试 -->
    <div class="section" id="button-section">
        <h2>按钮点击测试</h2>
        <button id="click-btn" onclick="handleClick()">点击我</button>
        <button id="double-click-btn" ondblclick="handleDoubleClick()">双击我</button>
        <button id="right-click-btn" oncontextmenu="handleRightClick(event)">右键点击我</button>
        <button id="disabled-btn" disabled>禁用按钮</button>
        <div id="click-result" class="result">点击次数: 0</div>
    </div>

    <!-- 鼠标悬停测试 -->
    <div class="section" id="hover-section">
        <h2>鼠标悬停测试</h2>
        <div id="hover-target" style="padding: 20px; background: #f0f0f0;"
             onmouseenter="handleHover()" onmouseleave="handleLeave()">
            鼠标悬停在这里
        </div>
        <div id="hover-result" class="result"></div>
    </div>

    <!-- 拖拽测试 -->
    <div class="section" id="drag-section">
        <h2>拖拽测试</h2>
        <div id="draggable" class="box" draggable="true" ondragstart="handleDragStart(event)">
            拖动我
        </div>
        <div id="drop-zone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)"
             onmouseup="handleMouseDrop(event)">
            拖放区域
        </div>
        <div id="drag-result" class="result"></div>
    </div>

    <!-- 动态内容测试 -->
    <div class="section" id="dynamic-section">
        <h2>动态内容测试</h2>
        <button onclick="showDelayedContent()">显示延迟内容(2秒)</button>
        <button onclick="hideContent()">隐藏内容</button>
        <button onclick="removeContent()">删除内容</button>
        <button onclick="addContent()">添加内容</button>
        <div id="dynamic-content" class="hidden">这是延迟显示的内容</div>
        <div id="content-container"></div>
    </div>

    <!-- Shadow DOM 测试 -->
    <div class="section" id="shadow-section">
        <h2>Shadow DOM 测试</h2>
        <div id="shadow-host"></div>
    </div>

    <!-- 表格测试 -->
    <div class="section" id="table-section">
        <h2>表格测试</h2>
        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>年龄</th>
                        <th>城市</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr data-id="1">
                        <td>1</td>
                        <td>张三</td>
                        <td>25</td>
                        <td>北京</td>
                        <td><button onclick="deleteRow(1)">删除</button></td>
                    </tr>
                    <tr data-id="2">
                        <td>2</td>
                        <td>李四</td>
                        <td>30</td>
                        <td>上海</td>
                        <td><button onclick="deleteRow(2)">删除</button></td>
                    </tr>
                    <tr data-id="3">
                        <td>3</td>
                        <td>王五</td>
                        <td>28</td>
                        <td>广州</td>
                        <td><button onclick="deleteRow(3)">删除</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 弹窗测试 -->
    <div class="section" id="alert-section">
        <h2>弹窗测试</h2>
        <button onclick="showAlert()">Alert弹窗</button>
        <button onclick="showConfirm()">Confirm弹窗</button>
        <button onclick="showPrompt()">Prompt弹窗</button>
        <button onclick="showModal()">模态框</button>
        <div id="alert-result" class="result"></div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>模态框标题</h3>
            <p>这是一个模态框内容</p>
            <button onclick="closeModal()">关闭</button>
        </div>
    </div>

    <!-- iframe 测试 -->
    <div class="section" id="iframe-section">
        <h2>iframe 测试</h2>
        <iframe id="test-iframe" srcdoc="<html><body><h1>iframe内容</h1><button id='iframe-btn' onclick='parent.postMessage(&quot;iframe clicked&quot;, &quot;*&quot;)'>iframe按钮</button></body></html>"></iframe>
    </div>

    <!-- 滚动测试 -->
    <div class="section" id="scroll-section">
        <h2>滚动测试</h2>
        <div id="scroll-container" style="height: 200px; overflow-y: scroll; border: 1px solid #ccc;">
            <div style="height: 1000px; padding: 20px;">
                <p>滚动内容开始</p>
                <p style="margin-top: 400px;">中间内容</p>
                <p id="scroll-target" style="margin-top: 400px;">滚动目标位置</p>
            </div>
        </div>
    </div>

    <!-- 网络请求测试 -->
    <div class="section" id="network-section">
        <h2>网络请求测试</h2>
        <button onclick="fetchData()">发起GET请求</button>
        <button onclick="postData()">发起POST请求</button>
        <div id="network-result" class="result"></div>
    </div>

    <!-- 控制台日志测试 -->
    <div class="section" id="console-section">
        <h2>控制台日志测试</h2>
        <button onclick="console.log('这是一条日志')">console.log</button>
        <button onclick="console.warn('这是一条警告')">console.warn</button>
        <button onclick="console.error('这是一条错误')">console.error</button>
        <button onclick="console.info('这是一条信息')">console.info</button>
    </div>

    <script>
        // 初始化 Shadow DOM
        const shadowHost = document.getElementById('shadow-host');
        const shadowRoot = shadowHost.attachShadow({mode: 'open'});
        shadowRoot.innerHTML = `
            <style>
                .shadow-content { color: blue; padding: 10px; }
            </style>
            <div class="shadow-content">
                <p id="shadow-text">这是Shadow DOM中的内容</p>
                <button id="shadow-btn" onclick="alert('Shadow DOM按钮被点击')">Shadow按钮</button>
            </div>
        `;

        // 点击计数
        let clickCount = 0;
        window.lastClickTrusted = null;
        window.lastDblClickTrusted = null;
        window.lastContextMenuTrusted = null;
        window.lastKeydownTrusted = null;
        window.lastMouseEnterTrusted = null;
        window.lastMouseDownTrusted = null;

        function handleClick() {
            clickCount++;
            window.lastClickTrusted = event.isTrusted;
            document.getElementById('click-result').textContent = '点击次数: ' + clickCount;
        }

        function handleDoubleClick() {
            window.lastDblClickTrusted = event.isTrusted;
            document.getElementById('click-result').textContent = '双击事件触发';
        }

        function handleRightClick(e) {
            e.preventDefault();
            window.lastContextMenuTrusted = e.isTrusted;
            document.getElementById('click-result').textContent = '右键点击事件触发';
        }

        // 表单提交
        function handleSubmit() {
            const text = document.getElementById('text-input').value;
            const email = document.getElementById('email-input').value;
            const textarea = document.getElementById('textarea').value;
            const select = document.getElementById('select-single').value;

            document.getElementById('form-result').innerHTML = `
                <strong>表单数据:</strong><br>
                文本: ${text}<br>
                邮箱: ${email}<br>
                多行: ${textarea}<br>
                选择: ${select}
            `;
        }

        // 鼠标悬停
        function handleHover() {
            window.lastMouseEnterTrusted = event.isTrusted;
            document.getElementById('hover-result').textContent = '鼠标进入';
        }

        function handleLeave() {
            document.getElementById('hover-result').textContent = '鼠标离开';
        }

        // 拖拽
        let isDragging = false;
        let draggedElement = null;
        window.isDragging = false;

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', 'dragged');
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drag-result').textContent = '拖放成功！时间: ' + new Date().toLocaleTimeString();
        }

        // 支持鼠标物理拖拽（用于WebDriver）
        document.addEventListener('DOMContentLoaded', function() {
            const draggable = document.getElementById('draggable');
            const dropZone = document.getElementById('drop-zone');
            const dragResult = document.getElementById('drag-result');

            draggable.addEventListener('mousedown', function(e) {
                isDragging = true;
                draggedElement = e.target;
                window.isDragging = true;
                window.lastMouseDownTrusted = e.isTrusted;
                console.log('mousedown on draggable, isTrusted:', e.isTrusted);
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging && draggedElement) {
                    const rect = dropZone.getBoundingClientRect();
                    if (e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom) {
                        dropZone.style.background = '#e0e0e0';
                    }
                }
            });

            document.addEventListener('mouseup', function(e) {
                if (isDragging && draggedElement) {
                    console.log('mouseup detected, isDragging:', isDragging, 'isTrusted:', e.isTrusted);
                    const rect = dropZone.getBoundingClientRect();
                    console.log('mouseup at:', e.clientX, e.clientY);
                    console.log('dropZone rect:', rect);
                    if (e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom) {
                        dragResult.textContent = '拖放成功！时间: ' + new Date().toLocaleTimeString();
                        console.log('Drop successful!');
                    } else {
                        console.log('Drop outside zone');
                    }
                    dropZone.style.background = '';
                    isDragging = false;
                    window.isDragging = false;
                    draggedElement = null;
                }
            });

            // 监听键盘事件的isTrusted
            document.addEventListener('keydown', function(e) {
                window.lastKeydownTrusted = e.isTrusted;
            });
        });

        function handleMouseDrop(e) {
            if (isDragging) {
                document.getElementById('drag-result').textContent = '拖放成功！时间: ' + new Date().toLocaleTimeString();
                isDragging = false;
                window.isDragging = false;
                draggedElement = null;
            }
        }

        // 动态内容
        function showDelayedContent() {
            setTimeout(() => {
                document.getElementById('dynamic-content').classList.remove('hidden');
            }, 2000);
        }

        function hideContent() {
            document.getElementById('dynamic-content').classList.add('hidden');
        }

        function removeContent() {
            const elem = document.getElementById('dynamic-content');
            if (elem) elem.remove();
        }

        function addContent() {
            const container = document.getElementById('content-container');
            const newDiv = document.createElement('div');
            newDiv.className = 'result';
            newDiv.textContent = '新添加的内容 ' + new Date().toLocaleTimeString();
            container.appendChild(newDiv);
        }

        // 表格操作
        function deleteRow(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (row) row.remove();
        }

        // 弹窗
        function showAlert() {
            alert('这是一个Alert弹窗');
            document.getElementById('alert-result').textContent = 'Alert已显示';
        }

        function showConfirm() {
            const result = confirm('确认要继续吗？');
            document.getElementById('alert-result').textContent = 'Confirm结果: ' + result;
        }

        function showPrompt() {
            const result = prompt('请输入你的名字:');
            document.getElementById('alert-result').textContent = 'Prompt结果: ' + (result || '取消');
        }

        function showModal() {
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 网络请求
        async function fetchData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data = await response.json();
                document.getElementById('network-result').innerHTML =
                    `<strong>GET响应:</strong><br>${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('network-result').textContent = '请求失败: ' + error.message;
            }
        }

        async function postData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: 'test', body: 'test body', userId: 1})
                });
                const data = await response.json();
                document.getElementById('network-result').innerHTML =
                    `<strong>POST响应:</strong><br>${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('network-result').textContent = '请求失败: ' + error.message;
            }
        }

        // iframe 消息监听
        window.addEventListener('message', (e) => {
            if (e.data === 'iframe clicked') {
                alert('收到iframe消息');
            }
        });
    </script>
</body>
</html>
