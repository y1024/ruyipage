<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Shadow + Iframe</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 18px; }
        .section { border: 1px solid #ddd; padding: 12px; margin: 10px 0; }
        iframe { width: 100%; height: 330px; border: 1px solid #bbb; }
    </style>
</head>
<body>
    <h1 id="host-title">Complex Host Page</h1>

    <div class="section">
        <h2>Host Open/Closed Shadow</h2>
        <div id="host-open-shadow"></div>
        <div id="host-closed-shadow"></div>
    </div>

    <div class="section">
        <h2>Nested iframe</h2>
        <iframe id="outer-iframe" src="./complex_inner_iframe.html"></iframe>
    </div>

    <script>
        (function () {
            const wm = new WeakMap();
            const orig = Element.prototype.attachShadow;
            Element.prototype.attachShadow = function (init) {
                const root = orig.call(this, init);
                if (init && init.mode === "closed") wm.set(this, root);
                return root;
            };
            window.__ruyiGetClosedShadowRoot = function (el) {
                return wm.get(el) || null;
            };
        })();

        const hostOpen = document.getElementById("host-open-shadow");
        const hostOpenRoot = hostOpen.attachShadow({ mode: "open" });
        hostOpenRoot.innerHTML = '<p id="host-open-text">host-open-text</p><button id="host-open-btn">host-open-btn</button>';

        const hostClosed = document.getElementById("host-closed-shadow");
        const hostClosedRoot = hostClosed.attachShadow({ mode: "closed" });
        const p = document.createElement("p");
        p.id = "host-closed-text";
        p.textContent = "host-closed-text";
        const btn = document.createElement("button");
        btn.id = "host-closed-btn";
        btn.textContent = "host-closed-btn";
        hostClosedRoot.appendChild(p);
        hostClosedRoot.appendChild(btn);
    </script>
</body>
</html>
